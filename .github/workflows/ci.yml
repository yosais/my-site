name: HTML Tag Check and Deploy
on:
  push:
    branches: ["main"] # Only deploy when pushing to main
  workflow_dispatch: # Allows you to run this manually from the Actions tab

# 1. ADD PERMISSIONS
permissions:
  contents: read
  pages: write
  id-token: write

# 2. PREVENT OVERLAPPING DEPLOYS
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Your existing validation logic
      - name: Check for <title> and <h1>
        run: |
          grep -q "<title>" index.html || (echo "Error: <title> tag missing!" && exit 1)
          grep -q "<h1>" index.html || (echo "Error: <h1> tag missing!" && exit 1)
          echo "Success: Required tags are present."

      # 3. CONFIGURE PAGES
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 4. UPLOAD THE FILES
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the root directory where index.html is

      # 5. EXECUTE DEPLOYMENT
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4